name: Build Android APK and AAB

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Build web assets and sync Capacitor
        run: |
          npm run build
          npx cap sync android

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install ImageMagick for launcher icons
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick
          command -v magick || command -v convert

      - name: Generate Android launcher icons
        run: chmod +x create-launcher-icon.sh && ./create-launcher-icon.sh

      - name: Prepare signing keystores
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          cd android/app
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > release.keystore
          elif [ ! -f release.keystore ]; then
            keytool -genkey -v -keystore release.keystore \
              -storepass libraryconnekto123 -alias libraryconnekto -keypass libraryconnekto123 \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=Library Connekto,O=Library Connekto,C=US"
          fi
          if [ ! -f debug.keystore ]; then
            keytool -genkey -v -keystore debug.keystore \
              -storepass android -alias androiddebugkey -keypass android \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US"
          fi

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Android APK and AAB
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          cd android
          export KEYSTORE_PASSWORD="${KEYSTORE_PASSWORD:-libraryconnekto123}"
          export KEY_ALIAS="${KEY_ALIAS:-libraryconnekto}"
          export KEY_PASSWORD="${KEY_PASSWORD:-libraryconnekto123}"
          ./gradlew assembleDebug assembleRelease bundleRelease

      - name: Prepare APK for GitHub Release
        id: apk
        run: |
          RELEASE_APK="android/app/build/outputs/apk/release/app-release.apk"
          DEBUG_APK="android/app/build/outputs/apk/debug/app-debug.apk"
          mkdir -p release-assets
          if [ -f "$RELEASE_APK" ]; then
            cp "$RELEASE_APK" release-assets/LibraryConnekto.apk
            echo "source=release" >> "$GITHUB_OUTPUT"
          elif [ -f "$DEBUG_APK" ]; then
            cp "$DEBUG_APK" release-assets/LibraryConnekto.apk
            echo "source=debug" >> "$GITHUB_OUTPUT"
          else
            echo "No APK artifact found" >&2
            exit 1
          fi

      - name: Upload website APK
        uses: actions/upload-artifact@v4
        with:
          name: website-apk
          path: release-assets/LibraryConnekto.apk
          if-no-files-found: error

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: ignore

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: ignore

      - name: Upload Release AAB
        uses: actions/upload-artifact@v4
        with:
          name: release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: ignore

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-${{ github.run_number }}
          name: Android build ${{ github.run_number }}
          body: |
            Automated Android build from commit ${{ github.sha }}.

            - APK asset: **LibraryConnekto.apk** (hosted on the website at `/LibraryConnekto.apk`)
            - Build type: ${{ steps.apk.outputs.source }}
          files: |
            release-assets/LibraryConnekto.apk
          make_latest: true
          generate_release_notes: true
