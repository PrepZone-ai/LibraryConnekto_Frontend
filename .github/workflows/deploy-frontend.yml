name: Deploy Frontend to Vercel

on:
  push:
    branches: [main, master]
    paths-ignore:
      - "**.md"
      - "android/**"
  workflow_dispatch:
  workflow_run:
    workflows: ["Build Android APK and AAB"]
    types: [completed]
    branches: [main, master]

concurrency:
  group: deploy-frontend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git init .
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            git fetch --depth=1 origin "${{ github.event.workflow_run.head_sha }}"
            git checkout --detach FETCH_HEAD
          else
            git fetch --depth=1 origin "${GITHUB_SHA}"
            git checkout --detach FETCH_HEAD
          fi

      - name: Setup Node.js 20
        run: |
          curl -fsSL https://raw.githubusercontent.com/nvm-sh/nvm/v0.40.3/install.sh | bash
          export NVM_DIR="$HOME/.nvm"
          . "$NVM_DIR/nvm.sh"
          nvm install 20
          nvm use 20
          echo "$NVM_DIR/versions/node/$(nvm version)/bin" >> $GITHUB_PATH
          node --version
          npm --version

      - name: Install dependencies
        run: npm ci

      - name: Bundle latest Android APK for direct download
        continue-on-error: true
        run: |
          mkdir -p public
          RELEASE_JSON=$(curl -fsSL \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/latest")
          APK_URL=$(echo "$RELEASE_JSON" | jq -r '.assets[] | select(.name=="LibraryConnekto.apk") | .browser_download_url' | head -n 1)
          if [ -n "$APK_URL" ] && [ "$APK_URL" != "null" ]; then
            curl -fsSL -L "$APK_URL" -o public/LibraryConnekto.apk
            echo "Bundled APK for website download ($(du -h public/LibraryConnekto.apk | cut -f1))"
          else
            echo "::warning::No published APK release yet. The download button will work after the Android build workflow succeeds."
          fi

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment information
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Generate Retell runtime config
        run: node scripts/generate-retell-config.mjs
        env:
          NODE_ENV: production
          VERCEL_ENV: production
          CI: true

      - name: Build project artifacts
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          NODE_ENV: production
          VERCEL_ENV: production
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deployment summary
        run: |
          echo "::notice::Frontend deployed to Vercel."
          echo "Project ID:       ${{ secrets.VERCEL_PROJECT_ID }}"
