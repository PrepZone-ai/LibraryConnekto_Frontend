name: Deploy Frontend to Vercel

on:
  push:
    branches: [main, master]
    paths-ignore:
      - "**.md"
      - "android/**"
  workflow_dispatch:
  workflow_run:
    workflows: ["Build Android APK and AAB"]
    types: [completed]
    branches: [main, master]

concurrency:
  group: deploy-frontend-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

jobs:
  deploy:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git init .
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            git fetch --depth=1 origin "${{ github.event.workflow_run.head_sha }}"
            git checkout --detach FETCH_HEAD
          else
            git fetch --depth=1 origin "${GITHUB_SHA}"
            git checkout --detach FETCH_HEAD
          fi

      - name: Setup Node.js 20
        run: |
          curl -fsSL https://raw.githubusercontent.com/nvm-sh/nvm/v0.40.3/install.sh | bash
          export NVM_DIR="$HOME/.nvm"
          . "$NVM_DIR/nvm.sh"
          nvm install 20
          nvm use 20
          echo "$NVM_DIR/versions/node/$(nvm version)/bin" >> $GITHUB_PATH
          node --version
          npm --version

      - name: Install dependencies
        run: npm ci

      - name: Bundle latest Android APK for direct download
        run: |
          set -euo pipefail
          mkdir -p public

          bundle_from_artifact() {
            local run_id="$1"
            local artifacts artifact_id apk_file

            artifacts=$(curl -fsSL \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/repos/${{ github.repository }}/actions/runs/${run_id}/artifacts")

            for name in website-apk release-apk debug-apk; do
              artifact_id=$(echo "$artifacts" | jq -r --arg n "$name" '.artifacts[] | select(.name==$n) | .id' | head -n 1)
              if [ -z "$artifact_id" ] || [ "$artifact_id" = "null" ]; then
                continue
              fi

              rm -rf /tmp/apk-extract /tmp/apk-artifact.zip
              curl -fsSL -L \
                -H "Accept: application/vnd.github+json" \
                -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
                "https://api.github.com/repos/${{ github.repository }}/actions/artifacts/${artifact_id}/zip" \
                -o /tmp/apk-artifact.zip
              unzip -qo /tmp/apk-artifact.zip -d /tmp/apk-extract
              apk_file=$(find /tmp/apk-extract -type f -name '*.apk' | head -n 1)
              if [ -n "$apk_file" ]; then
                cp "$apk_file" public/LibraryConnekto.apk
                echo "Bundled APK from workflow artifact ${name} ($(du -h public/LibraryConnekto.apk | cut -f1))"
                return 0
              fi
            done

            return 1
          }

          bundle_from_release() {
            local release_json apk_api_url

            release_json=$(curl -fsSL \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/repos/${{ github.repository }}/releases/latest")
            apk_api_url=$(echo "$release_json" | jq -r '.assets[] | select(.name=="LibraryConnekto.apk") | .url' | head -n 1)
            if [ -z "$apk_api_url" ] || [ "$apk_api_url" = "null" ]; then
              return 1
            fi

            curl -fsSL -L \
              -H "Accept: application/octet-stream" \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              "$apk_api_url" \
              -o public/LibraryConnekto.apk
            echo "Bundled APK from GitHub release ($(du -h public/LibraryConnekto.apk | cut -f1))"
          }

          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            RUN_ID="${{ github.event.workflow_run.id }}"
            for attempt in 1 2 3 4 5; do
              if bundle_from_artifact "$RUN_ID"; then
                exit 0
              fi
              echo "Workflow artifacts not ready yet (attempt ${attempt}/5), waiting..."
              sleep 15
            done
            echo "::warning::Workflow artifacts unavailable, trying GitHub release..."
          fi

          for attempt in 1 2 3 4 5; do
            if bundle_from_release; then
              exit 0
            fi
            echo "GitHub release not ready yet (attempt ${attempt}/5), waiting..."
            sleep 10
          done

          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "::error::Failed to bundle APK for website download after Android build."
            exit 1
          fi

          echo "::warning::No published APK release yet. Website download will use /api/apk-download fallback."

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment information
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Generate Retell runtime config
        run: node scripts/generate-retell-config.mjs
        env:
          NODE_ENV: production
          VERCEL_ENV: production
          CI: true

      - name: Build project artifacts
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          NODE_ENV: production
          VERCEL_ENV: production
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deployment summary
        run: |
          echo "::notice::Frontend deployed to Vercel."
          echo "Project ID:       ${{ secrets.VERCEL_PROJECT_ID }}"
